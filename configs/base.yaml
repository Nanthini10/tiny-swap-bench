experiment_name: baseline_reference

model:
  n_layer: 11
  n_embd: 384
  n_head: 6
  mlp_ratio: 4.0
  seq_len: 512
  vocab_size: 50257
  dropout: 0.0
  pe: learned_abs
  norm: pre_ln_ln

train:
  lr: 6.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 100
  batch_size: 64
  grad_accum_steps: 1
  max_train_tokens: 1000000000
  precision: bf16
  optimizer: adamw
  seed: 0

data:
  dataset_path: roneneldan/TinyStories
  dataset_split_train: train
  val_fraction: 0.01
  tokenizer_name: gpt2

eval:
  eval_interval_steps: 500
  checkpoint_interval_steps: 500
  generation_num_samples: 100
  flop_matched_budget_tokens: 1000000000
